name: Rebuild index (매일 정렬)

on:
  schedule:
    # 매일 21:30 UTC (KST 06:30)
    - cron: "30 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: index
  cancel-in-progress: false

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Rebuild index.md (frontmatter → 최신순 정렬)
        run: python tools/build_index.py
      - name: Commit & push if changed
        run: |
          if [ -z "$(git status --porcelain index.md)" ]; then
            echo "index 변경 없음 — 커밋 생략"; exit 0
          fi
          git config user.name "index-bot"
          git config user.email "index-bot@users.noreply.github.com"
          git add index.md
          git commit -m "chore(index): 프론트매터 기반 재생성·최신순 정렬"
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push origin HEAD:main && break || {
              echo "재시도 $i"; git rebase --abort 2>/dev/null || true; sleep 5;
            }
          done
