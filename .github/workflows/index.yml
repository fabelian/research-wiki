name: Tidy & index (매일 정리·정렬)

on:
  schedule:
    # 매일 21:30 UTC (KST 06:30)
    - cron: "30 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: index
  cancel-in-progress: false

jobs:
  tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fix links + frontmatter (명명정규화·쓰레기링크 해제·type 보강)
        run: python tools/fix_wiki.py
      - name: Rebuild 매크로 대시보드 (스냅샷 → 날짜×지표 14일)
        run: python tools/build_macro_dashboard.py
      - name: Rebuild index.md (frontmatter → 최신순 정렬)
        run: python tools/build_index.py
      - name: Commit & push if changed
        run: |
          if [ -z "$(git status --porcelain wiki/ index.md)" ]; then
            echo "변경 없음 — 커밋 생략"; exit 0
          fi
          git config user.name "index-bot"
          git config user.email "index-bot@users.noreply.github.com"
          git add wiki/ index.md
          git commit -m "chore(tidy): 링크 정규화·인덱스 재생성(최신순)"
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push origin HEAD:main && break || {
              echo "재시도 $i"; git rebase --abort 2>/dev/null || true; sleep 5;
            }
          done
